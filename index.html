<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>B11 Mayapuri Announcements</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#ececec;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:95vw;
    height:95vh;
    background:white;
    border:8px solid #2b2b2b;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    display:flex;
    flex-direction:column;
}

.header{
    height:90px;
    background:#0B4E9F;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
}

.company{
    font-size:48px;
    font-weight:700;
}

.clock{
    font-size:34px;
    font-weight:600;
}

.row{
    height: 80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:2px solid #e5e5e5;
    padding:0 30px;
}

.row:last-child{
    border-bottom:none;
}

.announcement{
    font-size:42px;
    font-weight:700;
    color:#111;
    width:75%;
}

.date{
    font-size:38px;
    font-weight:600;
    color:#222;
    text-align:right;
    width:25%;
}

.footer{
    height:50px;
    background:#f5f5f5;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding-right:25px;
    font-size:18px;
    color:#666;
}

.today{
    background:#fff8d6;
}

.overdue{
    background:#ffe3e3;
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="company">B11 MAYAPURI</div>
        <div class="clock" id="clock">--:--</div>
    </div>

    <div id="announcementRows"></div>

    <div class="footer">
        Last Updated: <span id="updatedTime" style="margin-left:8px;">--</span>
    </div>

</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRMwciUcEVYNE-XyirHS0Y_U-nfGAErzVAYjLIvt8RsXv7erKj0T_hriCVrqBi7wZYYF_N5FT7gPDWu/pub?output=csv";

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerText =
    now.toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit'
    });

}

async function loadSheetData(){

    try{

        const response = await fetch(SHEET_URL + "&t=" + Date.now());

        const csv = await response.text();

        const rows = csv.trim().split("\n");

        let html = "";

        const today = new Date();
        today.setHours(0,0,0,0);

        for(let i=1;i<rows.length;i++){

            const cols = rows[i].split(",");

            const announcement = cols[0] || "";
            const dateText = cols[1] || "";

            let rowClass = "";

            const taskDate = new Date(dateText);

            if(!isNaN(taskDate)){

                taskDate.setHours(0,0,0,0);

                if(taskDate.getTime() === today.getTime()){
                    rowClass = "today";
                }

                if(taskDate < today){
                    rowClass = "overdue";
                }
            }

            html += `
            <div class="row ${rowClass}">
                <div class="announcement">${announcement}</div>
                <div class="date">${dateText}</div>
            </div>
            `;
        }

        document.getElementById("announcementRows").innerHTML = html;

        document.getElementById("updatedTime").innerText =
        new Date().toLocaleTimeString();

    }

    catch(error){

        console.error(error);

    }

}

updateClock();
loadSheetData();

setInterval(updateClock,1000);
setInterval(loadSheetData,5000);

</script>

</body>
</html>
